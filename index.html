<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-TRACKER v1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00f3ff; --neon-pink: #ff00ff; --cyber-yellow: #fcee0a; --dark-bg: #050505; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px); background-size: 30px 30px; }
        .cyber-card { position: relative; background: rgba(10, 10, 10, 0.9); border: 2px solid var(--neon-cyan); padding: 40px; width: 350px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1); clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%); }
        .cyber-card::before { content: "NO-STORAGE SYSTEM ACTIVE"; position: absolute; top: -10px; left: 20px; background: var(--neon-pink); color: white; font-size: 9px; padding: 2px 8px; font-family: 'Orbitron'; font-weight: bold; }
        h1 { font-family: 'Orbitron'; font-size: 24px; color: var(--cyber-yellow); text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; text-shadow: 2px 2px var(--neon-pink); }
        .data-row { text-align: left; margin: 15px 0; padding: 10px; border-left: 3px solid var(--neon-cyan); background: rgba(0, 243, 255, 0.05); }
        .label { font-size: 12px; color: var(--neon-pink); text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 20px; font-weight: bold; color: white; display: block; font-family: 'Orbitron'; }
        .btn-maps { display: block; width: 100%; margin-top: 25px; padding: 12px; background: var(--cyber-yellow); color: black; text-decoration: none; font-weight: bold; font-family: 'Orbitron'; text-align: center; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%); transition: 0.3s; box-sizing: border-box; }
        .btn-maps:hover { background: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); }
        .status-dot { height: 8px; width: 8px; background-color: var(--neon-cyan); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px var(--neon-cyan); animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="cyber-card">
        <h1>Cyber_Loc v2.0</h1>
        <div class="data-row">
            <span class="label">Last Signal</span>
            <span id="waktu" class="value">--:--:--</span>
        </div>
        <div class="data-row">
            <span class="label">Latitude</span>
            <span id="lat" class="value">0.000000</span>
        </div>
        <div class="data-row">
            <span class="label">Longitude</span>
            <span id="lng" class="value">0.000000</span>
        </div>
        <div id="status" style="font-size: 10px; margin-top: 10px; color: var(--neon-cyan);">
            <span class="status-dot"></span> SCANNING REALTIME...
        </div>
        <a id="mapsLink" href="#" target="_blank" class="btn-maps" style="display: none;">LOCATE TARGET</a>
    </div>

    <script>
        // Memuat data lama dari memori browser jika ada
        function loadSavedData() {
            const savedLat = localStorage.getItem('last_lat');
            const savedLng = localStorage.getItem('last_lng');
            const savedTime = localStorage.getItem('last_time');

            if (savedLat && savedLng) {
                updateUI(savedLat, savedLng, savedTime);
            }
        }

        function updateUI(lat, lng, waktu) {
            document.getElementById('lat').innerText = lat;
            document.getElementById('lng').innerText = lng;
            document.getElementById('waktu').innerText = waktu;
            
            const btn = document.getElementById('mapsLink');
            btn.href = `https://www.google.com/maps?q=${lat},${lng}`;
            btn.style.display = 'block';
        }

        async function listenStream() {
            try {
                const r = await fetch('/api/update_lokasi');
                const d = await r.json();
                
                // Jika dapet data asli (bukan timeout bawaan server)
                if(d && !d.timeout && d.lat) {
                    // Simpan ke memori lokal browser biar permanen di sisi user
                    localStorage.setItem('last_lat', d.lat);
                    localStorage.setItem('last_lng', d.lng);
                    localStorage.setItem('last_time', d.waktu);
                    
                    updateUI(d.lat, d.lng, d.waktu);
                }
            } catch(e) {
                console.log("Koneksi tersendat, mencoba ulang...");
            }
            // Langsung request lagi biar real-time tanpa jeda delay lama
            setTimeout(listenStream, 1000);
        }

        // Jalankan pas web dibuka
        loadSavedData();
        listenStream();
    </script>
</body>
</html>
